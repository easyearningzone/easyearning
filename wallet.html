<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"/>
    <title>আমার ওয়ালেট - EASY EARNING ZONE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root{ --g1:#ff1493; --g2:#ffd700; --bg:#fffdf0; }
        body{ background:var(--bg); font-family:'Noto Sans Bengali', 'Hind Siliguri', sans-serif; margin:0; padding-bottom: 100px; }
        
        /* ড্যাশবোর্ডের মতো হেডার */
        header { 
            height: 75px; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px; 
            background: linear-gradient(135deg, #FF1493 0%, #FF1493 40%, #FFD700 100%); 
            box-shadow: 0 4px 20px rgba(255, 20, 147, 0.3); border-bottom: 2px solid #FFD700;
        }

        .balance-card {
            background: linear-gradient(135deg, #FF1493 0%, #C71585 100%);
            border-radius: 25px; color: white; padding: 30px 20px;
            text-align: center; box-shadow: 0 10px 25px rgba(255, 20, 147, 0.2);
            border-bottom: 4px solid #FFD700; margin-top: 100px;
        }

        .action-card {
            background: white; border-radius: 20px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            transition: 0.3s;
        }

        /* ফুটার স্টাইল (আপনার ড্যাশবোর্ড থেকে নেওয়া) */
        .dc-foot {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 999; box-shadow: 0 -8px 25px rgba(255, 20, 147, 0.2);
            background: linear-gradient(135deg, #FF1493 0%, #C71585 100%);
            border-top: 2px solid #FFD700;
        }
        .dc-foot a { flex: 1; text-align: center; text-decoration: none; color: white; }
        .dc-foot .bubble {
            width: 44px; height: 44px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2px auto; background:rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .dc-foot .label { font-size: 11px; font-weight: 800; display: block; margin-top: 4px; }
        
        .center-wrap { margin-top: -38px; }
        .center-wrap .bubble {
            width: 68px; height: 68px; border-radius: 24px;
            border: 4px solid #FFD700; background: linear-gradient(135deg, #FF1493, #FF69B4) !important;
        }
        .active-link .bubble { background: #FFD700 !important; color: #FF1493 !important; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <button onclick="history.back()" style="font-size:22px; color:#FFFFFF;"><i class="fa-solid fa-arrow-left-long"></i></button>
        <h1 style="font-weight:900; font-size:20px; color: #fff; margin:0;">মাই ওয়ালেট</h1>
    </div>
    <div style="border-left:2px solid #FFD700; padding-left:12px;">
         <img src="https://myearningzone.com/images/logo-20260221212348.jpeg" alt="Logo" style="height:42px; border-radius: 8px;">
    </div>
</header>

<div class="container px-4">
    <div class="balance-card">
        <p style="font-size: 14px; font-weight: 600; opacity: 0.9;">আপনার বর্তমান ব্যালেন্স</p>
        <h2 style="font-size: 45px; font-weight: 900; margin: 10px 0;">৳ <span id="mainBalance">0.00</span></h2>
        <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px;">
            <span style="background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 50px; font-size: 12px;">
                <i class="fa-solid fa-shield-check"></i> ভেরিফাইড অ্যাকাউন্ট
            </span>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-6">
            <div class="action-card text-center">
                <i class="fa-solid fa-chart-line" style="color: #FF1493; font-size: 24px;"></i>
                <p style="font-size: 11px; color: #666; font-weight: bold; margin-top: 5px;">মোট ইনকাম</p>
                <h4 style="font-size: 16px; font-weight: 800; color: #333;">৳ <span id="totalEarn">0.00</span></h4>
            </div>
        </div>
        <div class="col-6">
            <div class="action-card text-center">
                <i class="fa-solid fa-money-bill-transfer" style="color: #FFD700; font-size: 24px;"></i>
                <p style="font-size: 11px; color: #666; font-weight: bold; margin-top: 5px;">মোট উত্তোলন</p>
                <h4 style="font-size: 16px; font-weight: 800; color: #333;">৳ 0.00</h4>
            </div>
        </div>
    </div>

    <div class="mt-4 space-y-3">
        <button onclick="location.href='withdraw.html'" class="w-full py-4 rounded-2xl text-white font-black flex items-center justify-center gap-3 shadow-lg" style="background: linear-gradient(90deg, #FF1493, #FFD700);">
            <i class="fa-solid fa-wallet text-xl"></i> টাকা উত্তোলন করুন
        </button>
        <button onclick="location.href='income_history.html'" class="w-full py-4 rounded-2xl bg-white border-2 border-pink-100 text-pink-600 font-black flex items-center justify-center gap-3 shadow-sm">
            <i class="fa-solid fa-clock-rotate-left text-xl"></i> ইনকাম হিস্ট্রি দেখুন
        </button>
    </div>
</div>

<footer class="dc-foot">
    <a href="index.html">
        <span class="bubble"><i class="fa fa-home" style="font-size:20px;"></i></span>
        <span class="label">হোম</span>
    </a>
    <a href="course.html">
        <span class="bubble"><i class="fa fa-user-tie" style="font-size:20px;"></i></span>
        <span class="label">কোর্স</span>
    </a>
    <a href="products.html" class="center-wrap">
        <span class="bubble"><i class="fa fa-store" style="font-size:26px; color: #FFD700;"></i></span>
        <span class="label">প্রোডাক্ট</span>
    </a>
    <a href="wallet.html" class="active-link">
        <span class="bubble"><i class="fa fa-wallet" style="font-size:20px;"></i></span>
        <span class="label">ওয়ালেট</span>
        <div style="width:5px; height:5px; background:#FFD700; border-radius:50%; margin: 2px auto 0;"></div>
    </a>
    <a href="network.html">
        <span class="bubble"><i class="fa fa-users" style="font-size:20px;"></i></span>
        <span class="label">নেটওয়ার্ক</span>
    </a>
</footer>

<script>
    const SUPABASE_URL = "https://apnzwgrupifhmifqbndu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Diosdxt2gvWcbb07LGYzLg_j6DM7Txn";
    const phone = localStorage.getItem('userPhone');

    async function loadData() {
        if(!phone) return;
        
        try {
            // ১. মেইন ব্যালেন্স লোড (Profiles Table)
            const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?phone=eq.${phone}`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const profile = await res.json();
            if(profile[0]) {
                document.getElementById('mainBalance').innerText = parseFloat(profile[0].balance).toFixed(2);
            }

            // ২. মোট ইনকাম হিসাব (Task Submissions Table)
            const taskRes = await fetch(`${SUPABASE_URL}/rest/v1/task_submissions?user_phone=eq.${phone}&status=eq.completed`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const tasks = await taskRes.json();
            let total = tasks.reduce((sum, item) => sum + parseFloat(item.reward), 0);
            document.getElementById('totalEarn').innerText = total.toFixed(2);

        } catch (e) { console.error(e); }
    }

    window.onload = loadData;
</script>

</body>
</html>
