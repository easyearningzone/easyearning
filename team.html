<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"/>
    <title>Easy Earning Zone - My Team</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;900&display=swap" rel="stylesheet"/>

    <style>
        :root {
            --primary: #ff1493;
            --secondary: #ffd700;
            --accent: #E4002B;
            --bg: #fffdf0;
        }

        body {
            background-color: var(--bg);
            font-family: 'Noto Sans Bengali', sans-serif;
            margin: 0;
            padding-bottom: 20px;
        }

        .bg-grad { background: linear-gradient(135deg, var(--primary), var(--secondary)); }

        /* Custom Header */
        header {
            height: 65px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary) 40%, var(--secondary) 100%);
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.2);
            border-bottom: 2px solid var(--secondary);
        }

        /* Sidebar logic */
        #sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 100;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        #sidebar.active { left: 0; }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 90;
            backdrop-filter: blur(2px);
        }

        /* Exit Button Styling */
        .exit-btn {
            background: rgba(255, 255, 255, 0.2);
            height: 40px;
            width: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .exit-btn:active { transform: scale(0.9); background: var(--accent); }

        /* Card Styles */
        .card-custom {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(255, 20, 147, 0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        /* Progress Bar */
        .progress-bar { height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; }
    </style>
</head>
<body oncontextmenu="return false">

    <header class="flex items-center justify-between px-4">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-white text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
            <h1 class="text-white font-black text-lg tracking-tight uppercase">EASY EARNING ZONE</h1>
        </div>
        
        <a href="dashboard.html" class="exit-btn" title="Exit">
            <i class="fa-solid fa-right-from-bracket"></i>
        </a>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <div class="bg-grad p-6 text-white">
            <h2 class="text-xl font-black">EEZ MENU</h2>
            <p class="text-xs opacity-80">আপনার ইনকাম ড্যাশবোর্ড</p>
        </div>
        <nav class="p-4 space-y-2 font-bold text-gray-600">
            <a href="dashboard.html" class="flex items-center p-3 rounded-xl hover:bg-pink-50"><i class="fa fa-home w-8 text-pink-500"></i> হোম</a>
            <a href="referral.html" class="flex items-center p-3 rounded-xl bg-pink-50 text-pink-600"><i class="fa fa-users w-8"></i> আমার টিম</a>
            <a href="tasks.html" class="flex items-center p-3 rounded-xl hover:bg-pink-50"><i class="fa fa-tasks w-8 text-pink-500"></i> টাস্ক</a>
            <hr class="my-2">
            <a href="logout.html" class="flex items-center p-3 rounded-xl text-red-500 hover:bg-red-50"><i class="fa fa-sign-out-alt w-8"></i> লগ আউট</a>
        </nav>
    </div>

    <main class="p-4 max-w-2xl mx-auto space-y-4">
        
        <div class="bg-grad rounded-3xl p-6 text-white relative overflow-hidden shadow-lg">
            <i class="fas fa-users-viewfinder absolute -right-10 -bottom-10 text-9xl opacity-10"></i>
            <h2 class="text-2xl font-black mb-1">টিম লেভেল স্ট্যাটাস</h2>
            <p class="text-sm font-semibold opacity-90">আপনার রেফারেল নেটওয়ার্ক চেক করুন</p>
        </div>

        <div class="card-custom p-4 flex justify-around items-center text-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">মোট মেম্বার</p>
                <p class="text-lg font-black text-pink-600">0</p>
            </div>
            <div class="h-8 w-[1px] bg-gray-100"></div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">ভেরিফাইড</p>
                <p class="text-lg font-black text-green-500">0</p>
            </div>
        </div>

        <div id="levels-list" class="space-y-4">
            </div>

    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        const levelsList = document.getElementById('levels-list');
        for (let i = 1; i <= 9; i++) {
            levelsList.innerHTML += `
                <div class="card-custom p-5">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="bg-pink-100 text-pink-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">লেভেল ${i}</span>
                            <div class="flex gap-4 mt-3">
                                <div>
                                    <p class="text-[10px] text-gray-400 font-bold">ভেরিফাইড</p>
                                    <p class="font-bold text-slate-700">0</p>
                                </div>
                                <div class="border-l pl-4">
                                    <p class="text-[10px] text-gray-400 font-bold">আনভেরিফাইড</p>
                                    <p class="font-bold text-slate-700">0</p>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-gray-400 uppercase">প্রগ্রেস</p>
                            <div class="progress-bar mt-1 w-20">
                                <div class="progress-fill" style="width: 0%"></div>
                            </div>
                            <p class="text-[10px] font-bold text-gray-500 mt-1">0%</p>
                        </div>
                    </div>
                    <a href="level-details.html?lv=${i}" class="block w-full text-center bg-gray-50 mt-4 py-2 rounded-xl text-xs font-black text-pink-600 hover:bg-pink-100 transition">ভিউ ডিটেইলস</a>
                </div>
            `;
        }
    </script>
</body>
      </html>
