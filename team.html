<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"/>
    <title>My Team - Easy Earning Zone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700;900&display=swap" rel="stylesheet"/>

    <style>
        :root { --p: #ff1493; --s: #ffd700; --bg: #fffdf0; }
        body { background: var(--bg); font-family: 'Noto Sans Bengali', sans-serif; padding-bottom: 30px; }
        .bg-grad { background: linear-gradient(135deg, var(--p), var(--s)); }
        header { 
            height: 65px; position: sticky; top: 0; z-index: 50; 
            background: linear-gradient(135deg, var(--p) 0%, var(--p) 40%, var(--s) 100%);
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.2);
        }
        .card-custom { background: white; border-radius: 20px; border: 1px solid rgba(255, 20, 147, 0.1); box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .progress-bar { height: 6px; background: #eee; border-radius: 10px; overflow: hidden; width: 80px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--p), var(--s)); width: 0%; transition: 1s; }
        .exit-btn { background: rgba(255, 255, 255, 0.2); height: 40px; width: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

    <header class="flex items-center justify-between px-4">
        <div class="flex items-center gap-3">
            <h1 class="text-white font-black text-lg tracking-tight uppercase">EASY EARNING ZONE</h1>
        </div>
        <a href="dashboard.html" class="exit-btn"><i class="fa-solid fa-house"></i></a>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-4">
        
        <div class="bg-grad rounded-3xl p-6 text-white relative overflow-hidden shadow-lg">
            <h2 class="text-2xl font-black mb-1">রেফারেল লেভেল</h2>
            <p class="text-sm font-semibold opacity-90">আপনার টিমের বর্তমান অবস্থা</p>
        </div>

        <div class="card-custom p-4 flex justify-around items-center text-center">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">টিম মেম্বার</p>
                <p id="total-team" class="text-xl font-black text-pink-600">0</p>
            </div>
            <div class="h-8 w-[1px] bg-gray-100"></div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">ভেরিফাইড</p>
                <p id="total-verified" class="text-xl font-black text-green-500">0</p>
            </div>
        </div>

        <div id="levels-container" class="space-y-4">
            </div>

    </main>

    <script>
        // Supabase Config
        const S_URL = "https://apnzwgrupifhmifqbndu.supabase.co";
        const S_KEY = "sb_publishable_Diosdxt2gvWcbb07LGYzLg_j6DM7Txn";
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // ধরে নিচ্ছি ইউজারের নিজস্ব আইডি (Login user ID)
        const currentUserID = "USER_PHONE_OR_ID"; // এখানে লগইন করা ইউজারের আইডি বসবে

        async function loadTeamData() {
            const container = document.getElementById('levels-container');
            container.innerHTML = `<p class="text-center py-10 text-slate-400 text-sm">ডাটা লোড হচ্ছে...</p>`;

            try {
                let overallVerified = 0;
                let overallTotal = 0;
                let levelsHtml = "";

                // লেভেল ১ থেকে ৯ পর্যন্ত ডাটা আনা (লজিক্যাল লুপ)
                for (let i = 1; i <= 9; i++) {
                    // এখানে আপনার ডাটাবেজ লজিক অনুযায়ী কুয়েরি হবে
                    // উদাহরণ: লেভেল ১ মানে যাদের referrer_id == currentUserID
                    const { data, count, error } = await _supabase
                        .from('profiles')
                        .select('*', { count: 'exact' })
                        .eq('referrer_level', i) // আপনার ডাটাবেজে level কলাম থাকলে
                        .eq('top_referrer', currentUserID); 

                    const total = count || 0;
                    const verified = data ? data.filter(u => u.status === 'verified').length : 0;
                    const unverified = total - verified;
                    const progress = total > 0 ? Math.round((verified / total) * 100) : 0;

                    overallTotal += total;
                    overallVerified += verified;

                    levelsHtml += `
                        <div class="card-custom p-5">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="bg-pink-100 text-pink-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">লেভেল ${i}</span>
                                    <div class="flex gap-4 mt-3">
                                        <div>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase">Verified</p>
                                            <p class="font-bold text-slate-700">${verified}</p>
                                        </div>
                                        <div class="border-l pl-4">
                                            <p class="text-[10px] text-gray-400 font-bold uppercase">Unverified</p>
                                            <p class="font-bold text-slate-700">${unverified}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black text-gray-400 uppercase">Progress</p>
                                    <div class="progress-bar mt-1">
                                        <div class="progress-fill" style="width: ${progress}%"></div>
                                    </div>
                                    <p class="text-[10px] font-bold text-gray-500 mt-1">${progress}%</p>
                                </div>
                            </div>
                            <button class="block w-full text-center bg-gray-50 mt-4 py-2 rounded-xl text-xs font-black text-pink-600 hover:bg-pink-100 transition">মেম্বার তালিকা</button>
                        </div>`;
                }

                container.innerHTML = levelsHtml;
                document.getElementById('total-team').innerText = overallTotal;
                document.getElementById('total-verified').innerText = overallVerified;

            } catch (err) {
                container.innerHTML = `<p class="text-center text-red-500 text-xs">Error: ${err.message}</p>`;
            }
        }

        window.onload = loadTeamData;
    </script>
</body>
</html>
