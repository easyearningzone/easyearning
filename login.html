<!DOCTYPE html>
<html lang="en">
    <head>
<title>Adixora|developed by Ahad</title>
    </head>
    <style>
        /* Poppins font import korle dekhte aro premium lagbe */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Animated Gradient Background */
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    overflow: hidden;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glassmorphism Container with Floating Animation */
.login-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 50px 40px;
    border-radius: 30px;
    width: 380px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    animation: float 4s ease-in-out infinite; /* Floating effect */
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
}

h2 {
    color: #fff;
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 35px;
    letter-spacing: 1px;
    text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

/* Input Fields with Neon Focus */
input {
    width: 100%;
    padding: 15px;
    margin-bottom: 25px;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 15px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: 0.4s;
    border: 1px solid transparent;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

input:focus {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid #00d2ff;
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
    transform: scale(1.03);
}

/* Button with Sliding Glow Effect */
button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.5s;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
}

button:hover::before {
    left: 100%;
}

button:hover {
    box-shadow: 0 0 30px #00d2ff;
    transform: translateY(-2px);
}
    </style>

    <body>
     
    <div class="login-container">
                 <h2>Welcome back</h2>
           <form type="login-box">
        <input type="number" placeholder="ENTER EMAIL" required>
        <input type="password " placeholder="Enter Your password " required>
            <button type="submit">Login</button>
           </form>

    </div>
<script>
  const DASHBOARD_PAGE = "index.html"; 
    const SUPABASE_URL = "https://apnzwgrupifhmifqbndu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Diosdxt2gvWcbb07LGYzLg_j6DM7Txn";

    // অটো লগইন চেক
    if(localStorage.getItem('userPhone')) {
        window.location.href = DASHBOARD_PAGE;
    }

    function togglePass(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector("i");
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      } else {
        input.type = "password";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const phone = document.getElementById('phone').value;
      const pass = document.getElementById('password').value;
      const btnText = document.getElementById('btnText');
      const loginBtn = document.getElementById('loginBtn');

      loginBtn.disabled = true;
      btnText.innerText = "যাচাই করা হচ্ছে...";

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?phone=eq.${phone}`, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
          }
        });

        const data = await response.json();

        if (data.length > 0) {
          const user = data[0];
          // আপনার আগের লজিক (Name | Pass: 123)
          if (user.full_name && user.full_name.includes(`Pass: ${pass}`)) {
            localStorage.setItem('userPhone', phone); 
            alert("লগইন সফল!");
            window.location.href = DASHBOARD_PAGE; 
          } else {
            alert("ভুল পাসওয়ার্ড!");
          }
        } else {
          alert("অ্যাকাউন্ট নেই! আগে রেজিস্ট্রেশন করুন।");
        }
      } catch (error) {
        alert("নেটওয়ার্ক এরর! আবার চেষ্টা করুন।");
      } finally {
        loginBtn.disabled = false;
        btnText.innerText = "লগইন করুন";
      }
    });
</script>
    

    </body>
          </html>
